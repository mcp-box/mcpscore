name: Publish npm

# Publishes the npm wrapper (npm/) with OIDC Trusted Publishing + provenance.
# Fires on a published GitHub Release (same event as the PyPI publish.yml, so
# `make release` ships both registries), plus manual dispatch as a fallback.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    # PyPI pre-releases (PEP 440 versions like 1.1.0b1) are not valid npm
    # semver and ship without the npm wrapper — skip npm for GitHub Releases
    # marked "pre-release". Manual dispatch still always publishes.
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      # No dependency caching is enabled (the `cache:` input is omitted), so
      # there is no cache to poison; the publish is OIDC + provenance built
      # from the checked-out release source.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Node 22 bundles npm 10.x, but OIDC Trusted Publishing needs npm >=
      # 11.5.1. Without it, npm authenticates with setup-node's placeholder
      # token and the registry rejects the publish with E404. Exact-pinned
      # official npm package — deterministic, no lockfile to install from.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.18.0  # zizmor: ignore[adhoc-packages]
      - name: Publish with provenance
        working-directory: npm
        run: npm publish --access public --provenance

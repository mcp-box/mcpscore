name: Docs

# Deployment is handled by the Mintlify GitHub App (serves the docs/ directory
# on pushes to main). This workflow only validates: the generated rules
# reference must match the rule registry, and the site must have no broken links.
on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/generate_rules_doc.py"
      - "mcpscore/rules/**"
      - "mcpscore/spec.py"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/generate_rules_doc.py"
      - "mcpscore/rules/**"
      - "mcpscore/spec.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --all-groups
      - name: Rules reference must match the rule registry
        run: |
          uv run python scripts/generate_rules_doc.py
          git diff --exit-code docs/rules.mdx
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
      - name: Check for broken links
        working-directory: docs
        run: npx --yes mint broken-links
